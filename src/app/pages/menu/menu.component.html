<mat-sidenav-container class="sidenav-container">
  <!-- MENU LATERAL -->
  <mat-sidenav #sidenav mode="side" [opened]="opened" class="sidenav" [fixedInViewport]="true">
    <div class="sidenav-inner">
      <div class="logo">DiCasa</div>
      <div class="user-info">👤 {{ usuario }}</div>

      <mat-divider></mat-divider>

      <mat-accordion class="submenu-accordion" [multi]="false">

        <!-- Pedidos -->
        <mat-expansion-panel>
          <mat-expansion-panel-header class="menu-btn">
            <mat-panel-title>
              <mat-icon class="menu-icon">inventory_2</mat-icon>
              Pedidos
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div class="submenu-wrapper">
            <button mat-button class="submenu-btn" routerLink="/menu/pedidos-list">
              📄 Consultar
            </button>
            <button mat-button class="submenu-btn" disabled>
              ➕ Novo Pedido
            </button>
          </div>
        </mat-expansion-panel>

        <!-- Estoque -->
        <mat-expansion-panel>
          <mat-expansion-panel-header class="menu-btn">
            <mat-panel-title>
              <mat-icon class="menu-icon">warehouse</mat-icon>
              Estoque
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div class="submenu-wrapper">
            <button mat-button class="submenu-btn" disabled>
              📦 Produtos
            </button>
            <button mat-button class="submenu-btn" disabled>
              📝 Inventário
            </button>
          </div>
        </mat-expansion-panel>

        <!-- Financeiro -->
        <mat-expansion-panel>
          <mat-expansion-panel-header class="menu-btn">
            <mat-panel-title>
              <mat-icon class="menu-icon">attach_money</mat-icon>
              Financeiro
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div class="submenu-wrapper">
            <button mat-button class="submenu-btn" routerLink="/menu/financeiro/dashboard">
              📊 Dashboard
            </button>
            <button mat-button class="submenu-btn" routerLink="/menu/financeiro/fluxo-caixa">
              📈 Fluxo de Caixa
            </button>
            <button mat-button class="submenu-btn" routerLink="/menu/financeiro/contas-receber">
              💳 Contas a Receber
            </button>
          </div>
        </mat-expansion-panel>

        <!-- Comercial -->
        <mat-expansion-panel>
          <mat-expansion-panel-header class="menu-btn">
            <mat-panel-title>
              <mat-icon class="menu-icon">trending_up</mat-icon>
              Comercial
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div class="submenu-wrapper">
            <button mat-button class="submenu-btn" routerLink="/menu/comercial/dashboard">
              📊 Dashboard
            </button>
            <button mat-button class="submenu-btn" routerLink="/menu/comercial/colaborador">
              👤 Colaborador
            </button>
          </div>
        </mat-expansion-panel>

        <ng-container *ngIf="authService.hasGroup('cn=administradores,cn=builtin,dc=dicasa,dc=lan')">
          <mat-expansion-panel class="config-panel">
            <mat-expansion-panel-header>
              <mat-icon>settings</mat-icon>
              <span>Configurações</span>
            </mat-expansion-panel-header>
              <a mat-list-item (click)="go('/settings/permissions')">
                <mat-icon>security</mat-icon>
                <span>Permissões</span>
              </a>
              <a mat-list-item (click)="go('/settings/geral')">
                <mat-icon>tune</mat-icon>
                <span>Geral</span>
              </a>
          </mat-expansion-panel>
        </ng-container>

      </mat-accordion>

      <mat-divider></mat-divider>

      <div class="logout-fixed">
        <button mat-flat-button color="warn" (click)="logout()">
          <mat-icon class="menu-icon">logout</mat-icon>
          Sair
        </button>
      </div>
    </div>
  </mat-sidenav>

  <!-- CONTEÚDO PRINCIPAL -->
  <mat-sidenav-content class="main-content">
    <button class="menu-toggle" mat-icon-button (click)="toggleSidenav(sidenav)">
      <mat-icon>{{ menuIcon }}</mat-icon>
    </button>

    <!-- É aqui que as rotas filhas do “/menu” vão renderizar -->
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
