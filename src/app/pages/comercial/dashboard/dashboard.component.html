<h2>Metas por Empresa</h2>

<mat-table [dataSource]="empresas" class="mat-elevation-z2">

  <ng-container *ngFor="let col of displayedColumns" [matColumnDef]="col">
    <mat-header-cell *matHeaderCellDef> {{ col | titlecase }} </mat-header-cell>
    <mat-cell *matCellDef="let e">
      <ng-container [ngSwitch]="col">
        <!-- Inputs editáveis -->
        <input *ngSwitchCase="'metaFaturamento'" matInput type="number" [(ngModel)]="e.metaFaturamento">
        <input *ngSwitchCase="'faturamentoReal'" matInput type="number" [(ngModel)]="e.faturamentoReal">
        <input *ngSwitchCase="'lucroReal'" matInput type="number" [(ngModel)]="e.lucroReal">
        <input *ngSwitchCase="'metaMargem'" matInput type="number" [(ngModel)]="e.metaMargem">

        <!-- Campos calculados -->
        <span *ngSwitchDefault>{{ e[col] | number: '1.0-2' }}</span>
      </ng-container>
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>

<button mat-raised-button color="primary" class="botao" (click)="calcular()">Calcular Indicadores</button>

<!-- Cards com totais consolidados -->
<div class="cards-kpis">
  <mat-card class="kpi-card green">
    <mat-icon>show_chart</mat-icon>
    <div class="kpi-text">
      <h3>Faturamento Total</h3>
      <p>{{ totalFaturamento | currency:'BRL' }}</p>
    </div>
  </mat-card>
  <mat-card class="kpi-card blue">
    <mat-icon>attach_money</mat-icon>
    <div class="kpi-text">
      <h3>Lucro Total</h3>
      <p>{{ totalLucro | currency:'BRL' }}</p>
    </div>
  </mat-card>
</div>
