<h2>Metas por Empresa</h2>

<mat-table [dataSource]="empresas" class="mat-elevation-z2">

  <ng-container matColumnDef="loja">
    <mat-header-cell *matHeaderCellDef> Loja </mat-header-cell>
    <mat-cell *matCellDef="let e"> {{e.loja}} </mat-cell>
  </ng-container>

  <ng-container matColumnDef="metaFaturamento">
    <mat-header-cell *matHeaderCellDef> Meta Faturamento </mat-header-cell>
    <mat-cell *matCellDef="let e">
      <input matInput type="number" [(ngModel)]="e.metaFaturamento">
    </mat-cell>
  </ng-container>

  <ng-container matColumnDef="metaLucro">
    <mat-header-cell *matHeaderCellDef> Meta Lucro </mat-header-cell>
    <mat-cell *matCellDef="let e">
      <input matInput type="number" [(ngModel)]="e.metaLucro">
    </mat-cell>
  </ng-container>

  <ng-container matColumnDef="metaMargem">
    <mat-header-cell *matHeaderCellDef> Margem (%) </mat-header-cell>
    <mat-cell *matCellDef="let e">
      <input matInput type="number" [(ngModel)]="e.metaMargem">
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="colunasMeta"></mat-header-row>
  <mat-row *matRowDef="let row; columns: colunasMeta;"></mat-row>
</mat-table>

<button mat-raised-button color="primary" class="botao" (click)="calcular()">Calcular Indicadores</button>

<!-- Cards com indicadores consolidados -->
<div class="cards-kpis">
  <mat-card class="kpi-card green">
    <mat-icon>show_chart</mat-icon>
    <div class="kpi-text">
      <h3>Faturamento Total</h3>
      <p>{{ totalFaturamento | currency:'BRL' }}</p>
    </div>
  </mat-card>
  <mat-card class="kpi-card blue">
    <mat-icon>attach_money</mat-icon>
    <div class="kpi-text">
      <h3>Lucro Total</h3>
      <p>{{ totalLucro | currency:'BRL' }}</p>
    </div>
  </mat-card>
</div>
