<div class="page-header">
  <h2>Metas por Empresa</h2>

  <div class="filters">
    <mat-form-field appearance="fill">
      <mat-label>Data Início</mat-label>
      <input matInput [matDatepicker]="dp1" [(ngModel)]="dataInicio" />
      <mat-datepicker-toggle matSuffix [for]="dp1"></mat-datepicker-toggle>
      <mat-datepicker #dp1></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Data Fim</mat-label>
      <input matInput [matDatepicker]="dp2" [(ngModel)]="dataFim" />
      <mat-datepicker-toggle matSuffix [for]="dp2"></mat-datepicker-toggle>
      <mat-datepicker #dp2></mat-datepicker>
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="buscar()" [disabled]="carregando">
      {{ carregando ? 'Carregando…' : 'Calcular ' }}
    </button>
  </div>
</div>

<div class="cards-grid">
  <div class="card" *ngFor="let c of cards">
    <div class="card-head">
      <mat-icon class="pin">grid_view</mat-icon>
      <div class="apelido">{{ c.apelido }}</div>
    </div>

    <!-- Debug rápido (remover depois) -->
    <pre style="font-size:11px; opacity:.6; margin:4px 0 0; white-space:pre-wrap;">
{{ c | json }}
    </pre>

    <div class="metric">
      <label>Faturamento Real</label>
      <div class="value">R$ {{ moeda(c.faturamento) }}</div>
    </div>
    <div class="metric">
      <label>Lucro Real</label>
      <div class="value">R$ {{ moeda(c.lucro) }}</div>
    </div>
    <div class="metric" [class.neg]="margemReal(c) < 0">
      <label>% Lucro</label>
      <div class="value">{{ (margemReal(c) * 100) | number:'1.1-1' }}%</div>
    </div>
  </div>
</div>

<!-- Totais -->
<div class="totais">
  <div class="total-card green">
    <div class="label">Faturamento Total</div>
    <div class="big">
      R$ {{ moeda(faturamentoTotal) }}
    </div>
  </div>

  <div class="total-card blue">
    <div class="label">Lucro Total</div>
    <div class="big">
      R$ {{ moeda(lucroTotal) }}
    </div>
  </div>
</div>
