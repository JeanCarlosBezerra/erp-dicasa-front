<div class="page-header">
  <h1>Usuários & Permissões</h1>
  <p class="page-desc">Gerencie permissões de acesso por usuário</p>
</div>

<div class="search-bar">
  <label>Buscar</label>
  <input type="text" [(ngModel)]="busca" (ngModelChange)="filtrar()" placeholder="username ou nome..." />
  <span class="count">Itens: {{ filteredUsuarios.length }}</span>
</div>

<div class="user-card" *ngFor="let user of filteredUsuarios">
  <div class="user-header">
    <div class="user-info">
      <div class="user-name">{{ user.username }}</div>
      <div class="user-meta">{{ user.nome }} • Empresa #{{ user.id_empresa }} • LDAP</div>
      <div class="admin-badge" *ngIf="isAdmin(user)">ADMIN ativo (god mode)</div>
    </div>
    <div class="user-actions">
      <label class="ativo-toggle">
        Ativo
        <input type="checkbox" [checked]="user.ativo" (change)="toggleAtivo(user)" />
      </label>
      <button class="btn-save" (click)="salvar(user)">Salvar</button>
    </div>
  </div>

  <div class="permissions-label">Permissões</div>

  <div class="chips">
    <span class="chip" *ngFor="let role of getRoles(user)">
      {{ getLabelForKey(role) }}
      <button class="chip-remove" (click)="removeRole(user, role)">×</button>
    </span>
    <span class="chip empty" *ngIf="!getRoles(user).length">Nenhuma permissão</span>
  </div>

  <div class="user-bottom">
    <div class="add-perm">
      <select (change)="addPermission(user, $event)">
        <option value="">Adicionar permissão</option>
        <optgroup *ngFor="let g of catalogGroups" [label]="g.group">
          <option *ngFor="let item of g.items"
            [value]="item.key"
            [disabled]="hasRole(user, item.key)">
            {{ item.label }}
          </option>
        </optgroup>
      </select>
    </div>
    <button class="btn-text" (click)="copyCSV(user)">Copiar CSV</button>
  </div>
</div>

<div class="empty-state" *ngIf="!filteredUsuarios.length">
  <mat-icon>search_off</mat-icon>
  <p>Nenhum usuário encontrado.</p>
</div>
