<form *ngIf="form" [formGroup]="form">
  <mat-accordion>
    <!-- painel de roles -->
    <mat-expansion-panel *ngFor="let role of roles">
      <mat-expansion-panel-header>
        <mat-panel-title>{{ role }}</mat-panel-title>
      </mat-expansion-panel-header>

      <mat-form-field appearance="fill" class="w-100">
        <mat-label>Módulos permitidos</mat-label>
        <mat-select formControlName="{{role}}" multiple>
          <mat-option *ngFor="let m of modules" [value]="m">{{ displayModule(m) }}</mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="saveRole(role)">Salvar</button>
    </mat-expansion-panel>

    <!-- painel de groups -->
    <mat-expansion-panel *ngFor="let grp of allGroups">
      <mat-expansion-panel-header>
        <mat-panel-title>{{ shortGroup(grp) }}</mat-panel-title>
      </mat-expansion-panel-header>

      <mat-form-field appearance="fill" class="w-100">
        <mat-label>Papéis atribuídos</mat-label>
        <mat-select formControlName="{{grp}}" multiple>
          <mat-option *ngFor="let role of roles" [value]="role">{{ role }}</mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-flat-button color="accent" (click)="saveGroup(grp)">Salvar</button>
    </mat-expansion-panel>
  </mat-accordion>
</form>
